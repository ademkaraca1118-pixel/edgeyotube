<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Subtitle TTS</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 350px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 0;
        }
        .container {
            padding: 20px;
            background: white;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            margin: -20px -20px 20px -20px;
            border-radius: 8px 8px 0 0;
            text-align: center;
        }
        h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 12px;
            opacity: 0.9;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 4px;
            background: #667eea;
            border-radius: 50%;
        }
        input[type="file"],
        input[type="number"],
        select {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 12px;
            font-family: inherit;
        }
        input[type="file"] {
            padding: 8px;
        }
        input[type="file"]::file-selector-button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        input[type="file"]::file-selector-button:hover {
            background: #764ba2;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button.secondary {
            background: #f0f0f0;
            color: #333;
            margin-top: 10px;
        }
        button.secondary:hover {
            background: #e0e0e0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
        .controls button {
            flex: 1;
            margin-bottom: 0;
        }
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .volume-control input {
            margin-bottom: 0;
        }
        .volume-value {
            font-size: 12px;
            color: #666;
            min-width: 30px;
        }
        .info-box {
            background: #f9f9f9;
            padding: 10px;
            border-left: 4px solid #667eea;
            border-radius: 4px;
            font-size: 11px;
            color: #666;
            margin-bottom: 15px;
        }
        .info-box strong {
            color: #333;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 YouTube Subtitle TTS</h1>
            <p class="subtitle">Subtitle'ları sesli oku</p>
        </header>

        <div class="info-box">
            <strong>📌 Nasıl çalışır:</strong> Subtitle dosyasını yükleyin, video oynatılırken zaman damgasına göre metni otomatik sesli okur.
        </div>

        <div class="section">
            <div class="section-title">Subtitle Dosyası</div>
            <input type="file" id="subtitleFile" accept=".txt" placeholder="subtitle.txt seçin">
            <div id="fileStatus" class="status"></div>
        </div>

        <div class="section">
            <div class="section-title">Ses Ayarları</div>
            
            <label for="language">Dil:</label>
            <select id="language">
                <option value="tr-TR">Türkçe</option>
                <option value="en-US">English</option>
                <option value="de-DE">Deutsch</option>
                <option value="fr-FR">Français</option>
                <option value="es-ES">Español</option>
                <option value="it-IT">Italiano</option>
            </select>

            <label for="rate">Hız:</label>
            <input type="number" id="rate" min="0.5" max="2" step="0.1" value="1" placeholder="Hız (0.5 - 2)">

            <div class="volume-control">
                <label for="volume" style="margin-bottom: 0;">Ses Düzeyi:</label>
                <input type="range" id="volume" min="0" max="1" step="0.1" value="1" style="flex: 1; margin-bottom: 0;">
                <span class="volume-value" id="volumeValue">100%</span>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Kontrol</div>
            <div class="controls">
                <button id="startBtn">▶️ Başla</button>
                <button id="pauseBtn" class="secondary">⏸️ Duraklat</button>
            </div>
            <button id="stopBtn" class="secondary">⏹️ Durdur</button>
        </div>

        <div id="status" class="status"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
